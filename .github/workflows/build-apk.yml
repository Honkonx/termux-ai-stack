# ============================================================
#  termux-ai-stack · GitHub Actions — Build APK
#  
#  Compila el APK usando EAS Build (servidores de Expo)
#  y lo sube como GitHub Release automáticamente.
#
#  CUÁNDO SE EJECUTA:
#    - Push a main con cambios en App/
#    - Tag con formato v* (ej: v1.5.0) → Release oficial
#    - Manual desde GitHub → Actions → "Build APK"
#
#  PREREQUISITO — un solo secreto en GitHub:
#    Settings → Secrets → Actions → New repository secret
#    Nombre: EXPO_TOKEN
#    Valor:  tu token de expo.dev
#            (expo.dev → Account Settings → Access Tokens → Create)
#
#  RESULTADO:
#    - APK disponible como artifact en cada run (~15 min)
#    - GitHub Release automático cuando se pushea un tag v*
# ============================================================

name: Build APK

on:
  # Trigger manual desde GitHub UI
  workflow_dispatch:
    inputs:
      profile:
        description: 'Perfil de build'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

  # Trigger automático en push a main (app) o en tag v*
  push:
    branches: [main]
    paths:
      - 'App/**'
      - '.github/workflows/build-apk.yml'
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK con EAS
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout del repo ───────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: App/package-lock.json

      # ── 3. Instalar dependencias ───────────────────────────
      - name: Instalar dependencias npm
        working-directory: App
        run: npm install

      # ── 4. Instalar EAS CLI ────────────────────────────────
      - name: Instalar EAS CLI
        run: npm install -g eas-cli@latest

      # ── 5. Login en Expo con token ─────────────────────────
      # El token viene del secreto EXPO_TOKEN del repo
      - name: Login en Expo
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ── 6. Configurar perfil de build ──────────────────────
      - name: Determinar perfil
        id: profile
        run: |
          # Si es tag → preview APK para release
          # Si es push a main → preview
          # Si es manual → usar el input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "BUILD_PROFILE=${{ github.event.inputs.profile }}" >> $GITHUB_ENV
          else
            echo "BUILD_PROFILE=preview" >> $GITHUB_ENV
          fi
          echo "Profile seleccionado: $BUILD_PROFILE"

      # ── 7. EAS Build ───────────────────────────────────────
      - name: EAS Build
        working-directory: App
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile ${{ env.BUILD_PROFILE }} \
            --non-interactive \
            --output ../build-output.apk

      # ── 8. Verificar que el APK existe ─────────────────────
      - name: Verificar APK
        run: |
          if [ ! -f "build-output.apk" ]; then
            # EAS puede guardarlo con otro nombre — buscar
            APK_FILE=$(find . -name "*.apk" 2>/dev/null | head -1)
            if [ -n "$APK_FILE" ]; then
              cp "$APK_FILE" build-output.apk
              echo "APK encontrado: $APK_FILE"
            else
              echo "⚠ APK no encontrado localmente — puede estar en expo.dev"
              echo "Descargando desde EAS..."
              # Obtener URL del último build
              BUILD_URL=$(eas build:list --platform android --limit 1 --json 2>/dev/null \
                | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0].get('artifacts',{}).get('buildUrl',''))" 2>/dev/null || echo "")
              if [ -n "$BUILD_URL" ]; then
                curl -fsSL -o build-output.apk "$BUILD_URL"
                echo "APK descargado desde: $BUILD_URL"
              fi
            fi
          fi
          ls -lh build-output.apk 2>/dev/null || echo "No se pudo obtener el APK"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ── 9. Subir como artifact ─────────────────────────────
      # Disponible en GitHub → Actions → el run → Artifacts
      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: termux-ai-stack-${{ github.sha }}
          path: build-output.apk
          retention-days: 30
          if-no-files-found: warn

      # ── 10. GitHub Release (solo en tags v*) ───────────────
      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build-output.apk
          name: "termux-ai-stack ${{ github.ref_name }}"
          body: |
            ## termux-ai-stack ${{ github.ref_name }}

            ### Instalación
            1. Descarga `build-output.apk`
            2. Transfiere al teléfono o descarga directo
            3. Instala (habilita "fuentes desconocidas" si es necesario)

            ### Prerequisitos
            - Termux instalado (F-Droid)
            - Dashboard corriendo: `bash ~/dashboard_start.sh`

            ### Cambios
            Ver [PROGRESO_sesion2_abril2026.md](PROGRESO_sesion2_abril2026.md)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
