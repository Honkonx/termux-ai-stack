# ============================================================
#  termux-ai-stack · GitHub Actions — Build APK
#
#  PREREQUISITO: secreto EXPO_TOKEN en el repo
#    Settings → Secrets → Actions → New repository secret
#    Nombre: EXPO_TOKEN
#    Valor:  expo.dev → Account Settings → Access Tokens → Create
#
#  RESULTADO:
#    - APK como artifact en cada run (~15 min)
#    - GitHub Release automático con tag v*
# ============================================================

name: Build APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Perfil de build'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

  push:
    branches: [main]
    paths:
      - 'App/**'
      - '.github/workflows/build-apk.yml'
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK con EAS
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Instalar dependencias ───────────────────────────
      - name: Instalar dependencias npm
        working-directory: App
        run: npm install

      # ── 4. EAS CLI ─────────────────────────────────────────
      - name: Instalar EAS CLI
        run: npm install -g eas-cli@latest

      # ── 5. Verificar login ─────────────────────────────────
      - name: Login en Expo
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ── 6. Perfil de build ─────────────────────────────────
      - name: Determinar perfil
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "BUILD_PROFILE=${{ github.event.inputs.profile }}" >> $GITHUB_ENV
          else
            echo "BUILD_PROFILE=preview" >> $GITHUB_ENV
          fi

      # ── 7. EAS Build (remoto — sin --output) ───────────────
      # EAS sube el APK a sus servidores. Lo descargamos después.
      - name: EAS Build
        working-directory: App
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile ${{ env.BUILD_PROFILE }} \
            --non-interactive \
            --wait

      # ── 8. Descargar APK desde EAS ─────────────────────────
      - name: Descargar APK desde EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        working-directory: App
        run: |
          echo "Obteniendo URL del último build..."
          BUILD_INFO=$(eas build:list \
            --platform android \
            --limit 1 \
            --json \
            --non-interactive \
            2>/dev/null)

          echo "Build info: $BUILD_INFO"

          BUILD_URL=$(echo "$BUILD_INFO" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if data and len(data) > 0:
              url = data[0].get('artifacts', {}).get('buildUrl', '')
              print(url)
          " 2>/dev/null || echo "")

          if [ -n "$BUILD_URL" ]; then
            echo "Descargando APK desde: $BUILD_URL"
            curl -fsSL -o ../build-output.apk "$BUILD_URL"
            ls -lh ../build-output.apk
          else
            echo "No se pudo obtener la URL — buscando APK localmente..."
            APK=$(find .. -name "*.apk" 2>/dev/null | head -1)
            [ -n "$APK" ] && cp "$APK" ../build-output.apk && echo "APK copiado: $APK"
          fi

      # ── 9. Artifact ────────────────────────────────────────
      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: termux-ai-stack-${{ github.sha }}
          path: build-output.apk
          retention-days: 30
          if-no-files-found: warn

      # ── 10. Release en tags v* ─────────────────────────────
      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build-output.apk
          name: "termux-ai-stack ${{ github.ref_name }}"
          body: |
            ## termux-ai-stack ${{ github.ref_name }}

            ### Instalación
            1. Descarga `build-output.apk`
            2. Instala en el teléfono (habilita fuentes desconocidas)
            3. Abre Termux: `bash ~/dashboard_start.sh`

            ### Prerequisitos
            - Termux (F-Droid)
            - Dashboard corriendo en Termux
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
